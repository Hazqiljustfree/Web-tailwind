<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacrea Studio | Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-100">

    <div class="navbar bg-base-100 shadow-sm border-b border-base-200 sticky top-0 z-50">
        <div class="flex-1">
            <a href="index.html" class="btn btn-ghost text-xl font-bold text-primary">NACREA</a>
        </div>
        <div class="flex-none">
            <ul class="menu menu-horizontal px-1">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html" class="active text-primary">Projects</a></li>
            </ul>
        </div>
    </div>

    <main class="container mx-auto px-4 py-12">
        <header class="mb-12">
            <h1 class="text-4xl font-extrabold text-neutral mb-2">Our Projects</h1>
            <p class="text-gray-500">Eksplorasi karya</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="group relative overflow-hidden rounded-box aspect-square">
                <img src="./images/project-saya-1.jpg" class="object-cover w-full h-full transition duration-500 group-hover:scale-110" alt="Camera">
                <div class="absolute inset-0 bg-black/40 flex items-end p-4 opacity-0 group-hover:opacity-100 transition">
                    <span class="text-white font-semibold">Street Photography</span>
                </div>
            </div>
            <div class="group relative overflow-hidden rounded-box aspect-square">
                <img src="./images/project-saya-2.jpg" class="object-cover w-full h-full transition duration-500 group-hover:scale-110" alt="Lens">
                <div class="absolute inset-0 bg-black/40 flex items-end p-4 opacity-0 group-hover:opacity-100 transition">
                    <span class="text-white font-semibold">Product Cinematic</span>
                </div>
            </div>
            <div class="group relative overflow-hidden rounded-box aspect-square">
                <img src="./images/project-saya-3.jpg" class="object-cover w-full h-full transition duration-500 group-hover:scale-110" alt="Landscape">
                <div class="absolute inset-0 bg-black/40 flex items-end p-4 opacity-0 group-hover:opacity-100 transition">
                    <span class="text-white font-semibold">Nature Series</span>
                </div>
            </div>
            <div class="group relative overflow-hidden rounded-box aspect-square">
                <img src="./images/project-saya-4.jpg" class="object-cover w-full h-full transition duration-500 group-hover:scale-110" alt="Health">
                <div class="absolute inset-0 bg-black/40 flex items-end p-4 opacity-0 group-hover:opacity-100 transition">
                    <span class="text-white font-semibold">Lifestyle Branding</span>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <a href="index.html" class="btn btn-outline">Kembali ke Beranda</a>
        </div>
    </main>

</body>
</html>
